{{ define "login.html" }}
    {{ template "header" . }}

    {{ template "form-login" .}}

    {{ template "footer" . }}
{{ end }}

{{ define "form-login" }}
<form hx-post="/login">
    Email: <input type="email" name="email" autocomplete="off"/>
    Contraseña: <input type="password" name="password" autocomplete="off"/>
    <button type="submit">Entrar</button>
</form>
{{ end }}
